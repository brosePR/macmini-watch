name: Mac Mini stock watch

on:
  # Cron disabled — Mac minis acquired May 2026. To re-arm, uncomment:
  # schedule:
  #   - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      test_ping:
        description: "Send a Slack test ping and exit (no real check)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: macmini-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run check
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEST_PING: ${{ inputs.test_ping == true && '1' || '0' }}
        run: python check.py

      - name: Commit state if changed
        run: |
          if ! git diff --quiet -- state.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update state"
            git push
          fi
